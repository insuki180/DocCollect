<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DocCollect HR</title>

<style>
:root{
--primary-color:#2563eb;
--success-color:#10b981;
--bg:#f4f6f8;
--card:#ffffff;
--text:#1f2937;
--muted:#6b7280;
--border:#e5e7eb;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg);
padding:15px;
line-height:1.5;
}

.container{
max-width:650px;
margin:auto;
background:var(--card);
padding:25px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,.06);
}

.header{text-align:center;margin-bottom:25px;}
.header img{max-height:60px;max-width:200px;object-fit:contain;margin-bottom:12px;}

.section-title{
font-size:12px;
text-transform:uppercase;
letter-spacing:1px;
font-weight:700;
color:var(--muted);
margin:25px 0 12px;
border-bottom:1px solid var(--border);
padding-bottom:6px;
}

label{
display:block;
font-size:13px;
font-weight:600;
margin-top:14px;
margin-bottom:6px;
}

input,select{
width:100%;
padding:13px;
border:1px solid var(--border);
border-radius:12px;
font-size:15px;
box-sizing:border-box;
}

.flex-row{display:flex;gap:12px;}
.flex-row>div{flex:1;}

.upload-input{display:none;}

.upload-label{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:25px;
border:2px dashed var(--border);
border-radius:14px;
background:#fafafa;
text-align:center;
cursor:pointer;
font-weight:600;
}

.submit-btn{
margin-top:25px;
width:100%;
padding:16px;
background:var(--primary-color);
color:#fff;
border:none;
border-radius:14px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.footer{text-align:center;margin-top:18px;font-size:12px;color:#9ca3af;}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div id="brandLogo"></div>
<h1 id="companyName">Loading...</h1>
<p id="formTitle"></p>
</div>

<form id="docCollectForm">

<div class="section-title">Personal Details</div>

<label>Full Name *</label>
<input type="text" name="name" required>

<label>Mobile Number *</label>
<input type="tel" name="phone" required>

<label>Email *</label>
<input type="email" name="email" required>

<div class="section-title">Job & Experience</div>

<div id="jobContainer"></div>

<label>Years of Experience *</label>
<select id="experience" name="experience" required>
<option value="">Select</option>
<option value="Fresher">Fresher</option>
<option value="0-1">0-1 Years</option>
<option value="1-3">1-3 Years</option>
<option value="3-5">3-5 Years</option>
<option value="5+">5+ Years</option>
</select>

<label>Current Location *</label>
<input type="text" name="location" required>

<div id="professionalSection">

<div class="section-title">Professional Details</div>

<div class="flex-row">
<div>
<label>Current CTC</label>
<input type="text" name="current_ctc">
</div>

<div>
<label>Expected CTC</label>
<input type="text" name="expected_ctc">
</div>
</div>

<label>Notice Period</label>
<select name="notice_period">
<option value="">Select</option>
<option>Immediate</option>
<option>15 Days</option>
<option>30 Days</option>
<option>60 Days</option>
<option>90 Days</option>
</select>

</div>

<div class="section-title">Documents</div>

<label>Resume *</label>
<input type="file" id="resumeFile" class="upload-input" accept="application/pdf" required>
<label for="resumeFile" class="upload-label">Upload Resume (PDF)</label>

<label>Other Documents</label>
<input type="file" id="otherFiles" class="upload-input" multiple>
<label for="otherFiles" class="upload-label">Certificates / ID Proof</label>

<button type="submit" class="submit-btn">Submit Application</button>

</form>

<div class="footer">Powered by DocCollect</div>

</div>

<script>

let SCRIPT_URL=null;
let API_KEY=null;
let companyKey=null;

async function loadBranding(){

const params=new URLSearchParams(window.location.search);
companyKey=params.get("company");

if(!companyKey)return;

const res=await fetch("companies.json");
const companies=await res.json();
const config=companies[companyKey];

if(!config)return;

document.getElementById("companyName").textContent=config.companyName;
document.getElementById("formTitle").textContent=config.formTitle;

if(config.logoUrl){
document.getElementById("brandLogo").innerHTML=`<img src="${config.logoUrl}">`;
}

document.documentElement.style.setProperty('--primary-color',config.primaryColor);

SCRIPT_URL=config.scriptUrl;
API_KEY=config.apiKey;

loadJobField(config);

}

function loadJobField(config){

const jobContainer=document.getElementById("jobContainer");

if(!config.jobConfig) return;

const type=config.jobConfig.type;

if(type==="dropdown"){

jobContainer.innerHTML="<label>Applying For *</label>";

const select=document.createElement("select");
select.name="role";
select.required=true;

const def=document.createElement("option");
def.value="";
def.textContent="Select Position";
select.appendChild(def);

config.jobConfig.jobs.filter(j=>j.active).forEach(job=>{
const opt=document.createElement("option");
opt.value=job.title;
opt.textContent=job.title;
select.appendChild(opt);
});

jobContainer.appendChild(select);

}

else if(type==="text"){

jobContainer.innerHTML=`
<label>Applying For *</label>
<input type="text" name="role" required>
`;

}

else if(type==="hidden"){

const hidden=document.createElement("input");
hidden.type="hidden";
hidden.name="role";
hidden.value=config.jobConfig.fixedValue;

jobContainer.appendChild(hidden);

jobContainer.innerHTML+=`
<label>Applying For</label>
<input type="text" value="${config.jobConfig.fixedValue}" disabled>
`;

}

}

loadBranding();

function toggleFresher(){

const exp=document.getElementById("experience").value;
const section=document.getElementById("professionalSection");

if(exp==="Fresher"){

section.style.opacity=".5";
section.style.pointerEvents="none";

section.querySelectorAll("input,select").forEach(i=>{
i.value="";
});

}else{

section.style.opacity="1";
section.style.pointerEvents="auto";

}

}

document.getElementById("experience").addEventListener("change",toggleFresher);
toggleFresher();

  // ----------- FORM SUBMIT HANDLER -----------

document.getElementById("docCollectForm").addEventListener("submit", async function(e){

e.preventDefault();

if(!SCRIPT_URL){
alert("Configuration not loaded");
return;
}

const btn=document.querySelector(".submit-btn");
btn.disabled=true;
btn.innerText="Submitting...";

try{

const form=document.getElementById("docCollectForm");
const formData=new FormData(form);

// attach company + security
formData.append("company",companyKey);
formData.append("apiKey",API_KEY);


// -------- RESUME FILE --------
const resume=document.getElementById("resumeFile").files[0];

if(resume){
formData.append("resume",resume);
}


// -------- OTHER DOCUMENTS --------
const otherFiles=document.getElementById("otherFiles").files;

for(let i=0;i<otherFiles.length;i++){
formData.append("documents",otherFiles[i]);
}


// -------- SEND TO APPS SCRIPT --------
const response=await fetch(SCRIPT_URL,{
method:"POST",
body:formData
});


const result=await response.text();

alert("Application submitted successfully");

form.reset();

}
catch(err){

console.error(err);
alert("Upload failed. Please try again.");

}

btn.disabled=false;
btn.innerText="Submit Application";

});

</script>

</body>
</html>
