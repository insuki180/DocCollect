<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DocCollect HR</title>

<style>
:root {
  --primary-color: #2563eb;
  --primary-hover: #1d4ed8;
  --success-color: #10b981;
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #e5e7eb;
  --ring: rgba(37, 99, 235, 0.2);
}

body {
  margin: 0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  padding: 20px 15px;
  color: var(--text);
}

.container {
  max-width: 600px;
  margin: auto;
  background: var(--card);
  padding: 35px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header img {
  max-height: 65px;
  margin-bottom: 12px;
  border-radius: 8px;
}

.header h1 {
  margin: 0 0 5px 0;
  font-size: 24px;
  color: var(--text);
}

.header p {
  margin: 0;
  color: var(--muted);
  font-size: 15px;
}

.section-title {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-weight: 700;
  color: var(--primary-color);
  margin: 30px 0 15px;
  border-bottom: 2px solid var(--bg);
  padding-bottom: 8px;
}

label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-top: 18px;
  margin-bottom: 8px;
  color: var(--text);
}

input[type="text"],
input[type="tel"],
input[type="email"],
select {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 15px;
  box-sizing: border-box;
  background-color: #fafafa;
  transition: all 0.2s ease;
  color: var(--text);
}

input:focus,
select:focus {
  outline: none;
  border-color: var(--primary-color);
  background-color: #fff;
  box-shadow: 0 0 0 4px var(--ring);
}

input:disabled {
  background-color: var(--bg);
  color: var(--muted);
  cursor: not-allowed;
}

.flex-row {
  display: flex;
  gap: 15px;
}
.flex-row > div {
  flex: 1;
}

/* File Upload Enhancements */
.upload-input {
  display: none;
}

.upload-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 25px 20px;
  border: 2px dashed var(--border);
  border-radius: 14px;
  background: #fafafa;
  text-align: center;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  color: var(--muted);
  transition: all 0.2s ease;
  margin-top: 5px;
}

.upload-label:hover {
  background: #f0f4f8;
  border-color: var(--primary-color);
  color: var(--primary-color);
}

.upload-label.has-file {
  background: #ecfdf5;
  border-color: var(--success-color);
  color: #065f46;
  border-style: solid;
}

/* Smooth Transition for Fresher Toggle */
#professionalSection {
  transition: opacity 0.3s ease;
}

/* Submit Button */
.submit-btn {
  margin-top: 35px;
  width: 100%;
  padding: 16px;
  background: var(--primary-color);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
}

.submit-btn:hover {
  background: var(--primary-hover);
}

.submit-btn:active {
  transform: scale(0.98);
}

.submit-btn:disabled {
  background: var(--muted);
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

.footer {
  text-align: center;
  margin-top: 25px;
  font-size: 13px;
  color: #9ca3af;
  font-weight: 500;
}

/* Mobile Responsiveness */
@media (max-width: 480px) {
  .container {
    padding: 25px 20px;
    border-radius: 16px;
  }
  .flex-row {
    flex-direction: column;
    gap: 0;
  }
  .header h1 {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div id="brandLogo"></div>
<h1 id="companyName">Loading...</h1>
<p id="formTitle">Please wait</p>
</div>

<form id="docCollectForm">

<div class="section-title">Personal Details</div>

<label>Full Name *</label>
<input type="text" name="name" placeholder="John Doe" required>

<label>Mobile Number *</label>
<input type="tel" name="phone" placeholder="+1 (555) 000-0000" required>

<label>Email *</label>
<input type="email" name="email" placeholder="john@example.com" required>

<div class="section-title">Job & Experience</div>

<div id="jobContainer"></div>

<label>Years of Experience *</label>
<select id="experience" name="experience" required>
<option value="">Select</option>
<option value="Fresher">Fresher</option>
<option value="0-1">0-1 Years</option>
<option value="1-3">1-3 Years</option>
<option value="3-5">3-5 Years</option>
<option value="5+">5+ Years</option>
</select>

<label>Current Location *</label>
<input type="text" name="location" placeholder="City, State" required>

<div id="professionalSection">

<div class="section-title">Professional Details</div>

<div class="flex-row">
<div>
<label>Current CTC</label>
<input type="text" name="current_ctc" placeholder="e.g. 5 LPA">
</div>

<div>
<label>Expected CTC</label>
<input type="text" name="expected_ctc" placeholder="e.g. 7 LPA">
</div>
</div>

<label>Notice Period</label>
<select name="notice_period">
<option value="">Select</option>
<option>Immediate</option>
<option>15 Days</option>
<option>30 Days</option>
<option>60 Days</option>
<option>90 Days</option>
</select>

</div>

<div class="section-title">Documents</div>

<label>Resume *</label>
<input type="file" id="resumeFile" class="upload-input" accept="application/pdf" required>
<label for="resumeFile" id="resumeLabel" class="upload-label">
  <span id="resumeText">Click to Upload Resume (PDF)</span>
</label>

<label>Other Documents</label>
<input type="file" id="otherFiles" class="upload-input" multiple>
<label for="otherFiles" id="otherDocsLabel" class="upload-label">
  <span id="otherDocsText">Click to Upload Certificates / ID Proof</span>
</label>

<button type="submit" id="submitBtn" class="submit-btn">Submit Application</button>

</form>

<div class="footer">Powered by DocCollect</div>

</div>

<script>

let SCRIPT_URL=null;
let API_KEY=null;
let companyKey=null;

/* ============================= */
/* Branding Loader */
/* ============================= */

async function loadBranding(){
  const params=new URLSearchParams(window.location.search);
  companyKey=params.get("company");

  if(!companyKey) {
    document.getElementById("companyName").textContent = "DocCollect";
    document.getElementById("formTitle").textContent = "Invalid Application Link";
    return;
  }

  try {
    const res=await fetch("companies.json");
    const companies=await res.json();
    const config=companies[companyKey];

    if(!config) {
      document.getElementById("companyName").textContent = "Company Not Found";
      document.getElementById("formTitle").textContent = "Please check your link";
      return;
    }

    document.getElementById("companyName").textContent=config.companyName;
    document.getElementById("formTitle").textContent=config.formTitle;

    if(config.logoUrl){
      document.getElementById("brandLogo").innerHTML=`<img src="${config.logoUrl}" alt="Company Logo">`;
    }

    document.documentElement.style.setProperty('--primary-color', config.primaryColor);
    
    // Auto-generate a darker hover color based on primary color (simplified via CSS variables usually, but keeping it simple here)
    document.documentElement.style.setProperty('--primary-hover', config.primaryColor); 
    document.documentElement.style.setProperty('--ring', config.primaryColor + '33'); // Adds 20% opacity hex for ring

    SCRIPT_URL=config.scriptUrl;
    API_KEY=config.apiKey;

    loadJobField(config);
  } catch(e) {
    console.error("Error loading config:", e);
    document.getElementById("companyName").textContent = "Error Loading Form";
  }
}

loadBranding();

/* ============================= */
/* Job Field Engine */
/* ============================= */

function loadJobField(config){
  const jobContainer=document.getElementById("jobContainer");
  if(!config.jobConfig) return;

  const type=config.jobConfig.type;

  if(type==="dropdown"){
    jobContainer.innerHTML="<label>Applying For *</label>";
    const select=document.createElement("select");
    select.name="role";
    select.required=true;

    const def=document.createElement("option");
    def.value="";
    def.textContent="Select Position";
    select.appendChild(def);

    config.jobConfig.jobs
      .filter(j=>j.active)
      .forEach(job=>{
        const opt=document.createElement("option");
        opt.value=job.title;
        opt.textContent=job.title;
        select.appendChild(opt);
      });

    jobContainer.appendChild(select);
  }
  else if(type==="text"){
    jobContainer.innerHTML=`
      <label>Applying For *</label>
      <input type="text" name="role" placeholder="e.g. Software Engineer" required>
    `;
  }
  else if(type==="hidden"){
    const hidden=document.createElement("input");
    hidden.type="hidden";
    hidden.name="role";
    hidden.value=config.jobConfig.fixedValue;
    jobContainer.appendChild(hidden);

    jobContainer.innerHTML+=`
      <label>Applying For</label>
      <input type="text" value="${config.jobConfig.fixedValue}" disabled>
    `;
  }
}

/* ============================= */
/* Fresher Toggle */
/* ============================= */

function toggleFresher(){
  const exp=document.getElementById("experience").value;
  const section=document.getElementById("professionalSection");

  if(exp==="Fresher"){
    section.style.opacity=".4";
    section.style.pointerEvents="none";
    section.querySelectorAll("input,select").forEach(i=>i.value="");
  } else {
    section.style.opacity="1";
    section.style.pointerEvents="auto";
  }
}

document.getElementById("experience").addEventListener("change",toggleFresher);
toggleFresher();

/* ============================= */
/* UI: File Upload Feedback */
/* ============================= */

document.getElementById("resumeFile").addEventListener("change", function(e) {
  const labelText = document.getElementById("resumeText");
  const labelBox = document.getElementById("resumeLabel");
  if (this.files && this.files.length > 0) {
    labelText.textContent = "📄 " + this.files[0].name;
    labelBox.classList.add("has-file");
  } else {
    labelText.textContent = "Click to Upload Resume (PDF)";
    labelBox.classList.remove("has-file");
  }
});

document.getElementById("otherFiles").addEventListener("change", function(e) {
  const labelText = document.getElementById("otherDocsText");
  const labelBox = document.getElementById("otherDocsLabel");
  if (this.files && this.files.length > 0) {
    const fileCount = this.files.length;
    labelText.textContent = fileCount === 1 ? "📁 " + this.files[0].name : "📁 " + fileCount + " files selected";
    labelBox.classList.add("has-file");
  } else {
    labelText.textContent = "Click to Upload Certificates / ID Proof";
    labelBox.classList.remove("has-file");
  }
});

/* ============================= */
/* Submit Handler (Base64 Upload) */
/* ============================= */

document.getElementById("docCollectForm").addEventListener("submit",async function(e){
  e.preventDefault();

  if(!SCRIPT_URL) return alert("Configuration not loaded. Please check your URL.");

  const form=document.getElementById("docCollectForm");
  const submitBtn = document.getElementById("submitBtn");

  // Loading state
  submitBtn.disabled = true;
  submitBtn.textContent = "Uploading... Please wait";

  try {
    const resumeFile=document.getElementById("resumeFile").files[0];
    const resumeB64=await toBase64(resumeFile);

    let otherDocs=[];
    const otherFiles=document.getElementById("otherFiles").files;

    for(let i=0;i<otherFiles.length;i++){
      const file=otherFiles[i];
      const b64=await toBase64(file);
      otherDocs.push({
        name:file.name,
        mimeType:file.type,
        data:b64
      });
    }

    const payload={
      apiKey:API_KEY,
      company:companyKey,
      name:form.name.value,
      phone:form.phone.value,
      email:form.email.value,
      role:form.role.value,
      experience:form.experience.value,
      location:form.location.value,
      current_ctc:form.current_ctc.value||"",
      expected_ctc:form.expected_ctc.value||"",
      notice_period:form.notice_period.value||"",
      resume:{
        name:resumeFile.name,
        mimeType:resumeFile.type,
        data:resumeB64
      },
      other_docs:otherDocs
    };

    await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(payload)
    });

    alert("Application submitted successfully!");
    
    // Reset Form UI
    form.reset();
    toggleFresher();
    document.getElementById("resumeText").textContent = "Click to Upload Resume (PDF)";
    document.getElementById("resumeLabel").classList.remove("has-file");
    document.getElementById("otherDocsText").textContent = "Click to Upload Certificates / ID Proof";
    document.getElementById("otherDocsLabel").classList.remove("has-file");

  }
  catch(err){
    alert("Upload failed. Please try again.");
    console.error(err);
  } finally {
    // Revert Loading state
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit Application";
  }
});

/* ============================= */
/* Base64 Converter */
/* ============================= */

function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
  });
}

</script>
</body>
</html>
